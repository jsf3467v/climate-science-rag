name: CI

# Exercises the deterministic, offline core only. The model stages HyDE,
# rerank, synthesis, and judge. The project needs the Anthropic API, and the corpus build needs
# arXiv, so neither runs here. The suite covers the pure logic those stages
# rely on, namely JSON parsing, tokenization, cleaning, ranking, and the scorers.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # Installing the serving requirements also confirms the Space pins resolve.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Syntax check (whole tree, including build and ablation scripts)
        run: python -m compileall -q src evaluation ablation tests

      - name: Run tests
        run: python -m pytest -q
